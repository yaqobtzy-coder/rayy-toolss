<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Maker Zone | Bizzy Tools Zone</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="maker.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i> Kembali</button>
            <h1><i class="fas fa-magic"></i> Maker Zone</h1>
        </div>
        
        <div id="resultArea" class="result-area" style="display: none;"></div>
        
        <h2 class="section-title"><i class="fas fa-id-card"></i> KTP & Dokumen</h2>
        <div class="menu-grid" id="documentGrid"></div>
        
        <h2 class="section-title"><i class="fas fa-users"></i> Fake Sosial Media</h2>
        <div class="menu-grid" id="socialGrid"></div>
        
        <h2 class="section-title"><i class="fas fa-palette"></i> Brat Style Generator</h2>
        <div class="menu-grid" id="bratGrid"></div>
        
        <h2 class="section-title"><i class="fas fa-gamepad"></i> Gaming</h2>
        <div class="menu-grid" id="gamingGrid"></div>
    </div>
    
    <div id="queryModal" class="query-modal">
        <div class="query-modal-content">
            <div class="query-modal-header">
                <h3 id="modalTitle">Masukkan Data</h3>
                <button class="close-modal-btn" onclick="closeQueryModal()"><i class="fas fa-times"></i></button>
            </div>
            <div id="queryFields"></div>
            <button class="btn-primary" id="submitQueryBtn">Proses</button>
        </div>
    </div>
    
    <div class="back-to-top" onclick="scrollToTop()">
        <i class="fas fa-chevron-up"></i>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"></script>
    <script src="global-music.js"></script>
    <script src="maker.js"></script>
</body>
</html>
